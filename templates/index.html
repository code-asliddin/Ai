<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Search Ultra - Karimov Asliddin</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00d2ff; --bg: #050a18; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-top: 80px; overflow-x: hidden; }
        
        /* Shaffof Sidebar */
        .sidebar { position: fixed; left: -320px; top: 0; width: 300px; height: 100%; background: rgba(10, 20, 40, 0.95); backdrop-filter: blur(15px); transition: 0.4s; z-index: 2000; padding: 100px 20px; border-right: 1px solid rgba(255,255,255,0.1); }
        .sidebar.active { left: 0; }

        /* Asosiy Card */
        .glass-card { width: 95%; max-width: 600px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        h1 { text-align: center; font-size: 2.2rem; margin-bottom: 25px; background: linear-gradient(45deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Kirish maydoni */
        .input-group { position: relative; display: flex; gap: 10px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px 15px; outline: none; font-size: 1rem; }
        .icon-btn { background: transparent; border: none; color: #aaa; font-size: 1.2rem; cursor: pointer; transition: 0.3s; padding: 0 10px; }
        .icon-btn:hover { color: var(--accent); }
        .send-btn { background: var(--accent); color: #000; border: none; padding: 12px 20px; border-radius: 15px; font-weight: bold; cursor: pointer; }

        #answer { margin-top: 25px; color: #ddd; line-height: 1.6; min-height: 50px; }
        .menu-toggle { position: fixed; top: 20px; left: 20px; z-index: 2001; font-size: 24px; cursor: pointer; color: var(--accent); }
    </style>
</head>
<body>

    <audio id="snd-msg" src="https://www.soundjay.com/communication/sounds/message-sent-1.mp3"></audio>

    <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>

    <div class="sidebar" id="sidebar">
        <div id="userInfo">
            <button class="send-btn" style="width: 100%;" onclick="googleLogin()">Google Login</button>
        </div>
        <hr style="margin: 20px 0; opacity: 0.1;">
        <p style="font-size: 0.8rem; color: var(--accent);">DEVELOPER: Karimov Asliddin</p>
    </div>

    <div class="glass-card">
        <h1>AI Search <span style="font-size: 1rem; vertical-align: middle;">PRO</span></h1>
        
        <div id="answer">Savolingizni bering...</div>

        <div class="input-group">
            <input type="text" id="query" placeholder="Xabar yozing..." onkeypress="if(event.key==='Enter') askAI()">
            <button class="icon-btn" onclick="startVoice()"><i class="fas fa-microphone"></i></button>
            <button class="send-btn" onclick="askAI()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG - Buni Firebase konsolidan olib almashtiring!
        const firebaseConfig = {
            apiKey: "AIza...", 
            authDomain: "LOYIHA-NOMI.firebaseapp.com",
            projectId: "LOYIHA-NOMI",
            storageBucket: "LOYIHA-NOMI.appspot.com",
            messagingSenderId: "12345",
            appId: "1:12345:web:abc"
        };
        firebase.initializeApp(firebaseConfig);

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

        async function askAI() {
            const q = document.getElementById('query').value;
            const ans = document.getElementById('answer');
            if(!q) return;

            ans.innerHTML = "<span style='color: var(--accent)'>AI o'ylamoqda...</span>";
            
            try {
                const res = await fetch('/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `query=${encodeURIComponent(q)}`
                });
                const data = await res.json();
                ans.innerText = data.result;
                document.getElementById('snd-msg').play();
            } catch(e) { ans.innerText = "Xatolik! API kalitini tekshiring."; }
        }

        function startVoice() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Speech) return alert("Brauzer ovozni qo'llab-quvvatlamaydi");
            const rec = new Speech();
            rec.lang = 'uz-UZ';
            rec.start();
            rec.onresult = (e) => { document.getElementById('query').value = e.results[0][0].transcript; askAI(); };
        }

        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then(res => {
                document.getElementById('userInfo').innerHTML = `<b>${res.user.displayName}</b>`;
            });
        }
    </script>
</body>
</html>
