<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Search Pro - Karimov Asliddin</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        :root { --neon-blue: #38bdf8; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: #020617; 
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b, #020617);
            min-height: 100vh; color: white; display: flex; flex-direction: column; align-items: center; padding: 100px 20px 40px;
            overflow-x: hidden;
        }

        /* Sidebar Fix */
        .sidebar { 
            position: fixed; left: -320px; top: 0; width: 300px; height: 100%; 
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); 
            transition: 0.4s ease; z-index: 10000; padding: 80px 20px 20px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
        }
        .sidebar.active { left: 0; box-shadow: 15px 0 50px rgba(0,0,0,0.7); }

        /* Profil Dizayni */
        .user-card { background: var(--glass); padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .user-card img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--neon-blue); margin-bottom: 10px; }

        /* Main Glass Card */
        .glass-card { 
            background: var(--glass); backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px; 
            padding: 40px 25px; width: 100%; max-width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h1 { font-size: 2.5rem; text-align: center; margin-bottom: 30px; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        input { 
            width: 100%; padding: 18px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 18px; color: white; margin-bottom: 15px; outline: none; font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-color: var(--neon-blue); }

        .btn { 
            width: 100%; padding: 16px; background: var(--neon-blue); border: none; border-radius: 18px; 
            color: #000; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .btn:active { transform: scale(0.96); }

        .menu-btn { position: fixed; top: 25px; left: 25px; z-index: 10001; font-size: 24px; cursor: pointer; background: var(--glass); padding: 10px 15px; border-radius: 15px; }

        #answer { margin-top: 25px; line-height: 1.7; font-size: 1rem; color: #cbd5e1; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <div class="sidebar" id="sidebar">
        <div id="authContainer">
            <button class="btn" onclick="googleLogin()">Google bilan kirish</button>
        </div>
        
        <h3 style="margin: 30px 0 15px; font-size: 0.9rem; color: var(--neon-blue); text-transform: uppercase;">Creator</h3>
        <p style="padding: 10px; background: var(--glass); border-radius: 10px;">Karimov Asliddin</p>

        <h3 style="margin: 30px 0 15px; font-size: 0.9rem; color: var(--neon-blue); text-transform: uppercase;">Tarix</h3>
        <div id="historyList"></div>
    </div>

    <div class="glass-card">
        <h1>AI Search Pro</h1>
        <input type="text" id="query" placeholder="Savol bering..." onkeypress="if(event.key==='Enter') askAI()">
        <button class="btn" onclick="askAI()">AI dan so'rash</button>
        <div id="answer"></div>
    </div>

    <script>
        // DIQQAT: Bu yerga Firebase Console'dan olingan ma'lumotlarni qo'ying!
        const firebaseConfig = {
            apiKey: "AIza...",
            authDomain: "AI-PRO-38.firebaseapp.com", // NAMUNA: your_auth_domain o'rniga haqiqiysini yozing
            projectId: "AI-PRO-38",
            storageBucket: "AI-PRO-38.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:12345:web:abcde"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(res => {
                const user = res.user;
                document.getElementById('authContainer').innerHTML = `
                    <div class="user-card">
                        <img src="${user.photoURL}">
                        <h4>${user.displayName}</h4>
                        <p style="font-size: 0.8rem; opacity: 0.6;">${user.email}</p>
                    </div>
                `;
            }).catch(e => {
                alert("Login xatosi: " + e.message);
            });
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        async function askAI() {
            const input = document.getElementById('query');
            const answerDiv = document.getElementById('answer');
            if(!input.value.trim()) return;

            answerDiv.innerHTML = "<p style='color: var(--neon-blue)'>AI o'ylamoqda...</p>";
            
            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `query=${encodeURIComponent(input.value)}`
                });
                const data = await response.json();
                answerDiv.innerText = data.result;
            } catch (e) {
                answerDiv.innerText = "Server xatosi!";
            }
        }
    </script>
</body>
</html>
