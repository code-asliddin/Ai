<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Search Premium - Karimov Asliddin</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --gold: #dfc27d; /* Och tillarang */
            --dark-grey: #1e293b; /* To'q kulrang */
            --light-grey: #f1f5f9; /* Och kulrang matn uchun */
            --bg: #0f172a; /* Asosiy fon */
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--light-grey); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Sidebar - Premium Style */
        .sidebar { position: fixed; left: -100%; top: 0; width: 280px; height: 100%; background: var(--dark-grey); backdrop-filter: blur(15px); transition: 0.3s ease; z-index: 10000; padding: 80px 20px; border-right: 1px solid rgba(223, 194, 125, 0.2); }
        .sidebar.active { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        .menu-toggle { position: fixed; top: 15px; left: 15px; z-index: 10001; font-size: 22px; cursor: pointer; color: var(--gold); background: rgba(255,255,255,0.05); padding: 10px 14px; border-radius: 12px; }

        /* Chat Area */
        .chat-display { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 120px; display: flex; flex-direction: column; gap: 20px; }
        .welcome-msg { text-align: center; margin-top: 40px; }
        .welcome-msg h1 { font-size: 2rem; color: var(--gold); letter-spacing: 1px; margin-bottom: 5px; }

        /* Xabar pufakchalari */
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 20px; line-height: 1.6; font-size: 0.95rem; animation: fadeIn 0.3s ease; }
        .user-msg { align-self: flex-end; background: var(--gold); color: #000; border-bottom-right-radius: 4px; font-weight: 500; }
        .ai-msg { align-self: flex-start; background: var(--dark-grey); color: var(--light-grey); border-bottom-left-radius: 4px; border: 1px solid rgba(223, 194, 125, 0.1); }

        /* Pastki qism - Input Fixed */
        .input-container { position: fixed; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, var(--bg) 70%, transparent); padding: 20px 15px 40px; }
        .input-wrapper { max-width: 600px; margin: 0 auto; display: flex; align-items: center; gap: 12px; background: #334155; padding: 10px 18px; border-radius: 30px; border: 1px solid rgba(223, 194, 125, 0.3); }
        
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 16px; }
        input::placeholder { color: #94a3b8; }
        
        .action-btn { background: transparent; border: none; color: var(--gold); font-size: 1.3rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; }
        .send-btn { background: var(--gold); color: #000; width: 42px; height: 42px; border-radius: 50%; justify-content: center; font-size: 1.1rem; }
        .action-btn:active { transform: scale(0.9); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <audio id="snd-click" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

    <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-layer-group"></i></div>

    <div class="sidebar" id="sidebar">
        <button onclick="googleLogin()" style="width:100%; padding:14px; border-radius:12px; border:1px solid var(--gold); background:transparent; color:var(--gold); font-weight:bold; cursor:pointer; margin-bottom:20px;">
            <i class="fab fa-google"></i> HISOBGA KIRISH
        </button>
        <div style="height:1px; background:rgba(223, 194, 125, 0.2); margin-bottom:20px;"></div>
        <p style="font-size:0.75rem; color:var(--gold); text-align:center;">KARIMOV ASLIDDIN</p>
    </div>

    <div class="chat-display" id="chatDisplay">
        <div class="welcome-msg">
            <h1>AI Search <span style="font-weight:300;">PREMIUM</span></h1>
            <p style="color:#64748b;">Oltin uslubdagi aqlli yordamchi</p>
        </div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <button class="action-btn" onclick="startVoice()"><i class="fas fa-microphone-lines"></i></button>
            <input type="text" id="query" placeholder="Savolingizni yozing..." autocomplete="off">
            <button class="action-btn send-btn" onclick="askAI()"><i class="fas fa-arrow-up"></i></button>
        </div>
    </div>

    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

        async function askAI() {
            const input = document.getElementById('query');
            const display = document.getElementById('chatDisplay');
            if(!input.value.trim()) return;

            const q = input.value;
            input.value = "";
            document.getElementById('snd-click').play();
            
            // User bubble
            display.innerHTML += `<div class="msg user-msg">${q}</div>`;
            
            // AI bubble placeholder
            const aiMsgDiv = document.createElement('div');
            aiMsgDiv.className = 'msg ai-msg';
            aiMsgDiv.innerHTML = "<i>O'ylanmoqdaman...</i>";
            display.appendChild(aiMsgDiv);
            display.scrollTop = display.scrollHeight;

            try {
                const res = await fetch('/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `query=${encodeURIComponent(q)}`
                });
                const data = await res.json();
                aiMsgDiv.innerText = data.result;
            } catch(e) { 
                aiMsgDiv.innerText = "Xatolik yuz berdi. Iltimos, API kalitni tekshiring."; 
            }
            display.scrollTop = display.scrollHeight;
        }

        function startVoice() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'uz-UZ';
            rec.onstart = () => { document.getElementById('query').placeholder = "Eshityapman..."; };
            rec.onresult = (e) => { 
                document.getElementById('query').value = e.results[0][0].transcript;
                askAI();
            };
            rec.start();
        }

        // Firebase - Ma'lumotlaringizni kiriting
        const firebaseConfig = { apiKey: "...", authDomain: "...", projectId: "...", storageBucket: "...", messagingSenderId: "...", appId: "..." };
        firebase.initializeApp(firebaseConfig);
        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then(res => {
                alert("Xush kelibsiz, " + res.user.displayName);
                toggleMenu();
            });
        }
    </script>
</body>
</html>
