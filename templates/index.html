<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Search Pro - Audio Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        :root { --neon: #38bdf8; --bg: #020617; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b, #020617);
            min-height: 100vh; color: white; display: flex; flex-direction: column; align-items: center; padding: 100px 20px 40px;
            overflow-y: auto; /* Scroll muammosi yechimi */
        }

        /* Qotishni oldini olish uchun optimallashtirilgan sidebar */
        .sidebar { 
            position: fixed; left: -310px; top: 0; width: 280px; height: 100%; 
            background: rgba(15, 23, 42, 0.98); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 10000; padding: 80px 20px 20px; border-right: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar.active { left: 0; box-shadow: 10px 0 40px rgba(0,0,0,0.8); }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 30px; padding: 35px 20px; width: 100%; max-width: 480px;
            animation: slideUp 0.6s ease-out; /* Kirish animatsiyasi */
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .btn { 
            width: 100%; padding: 16px; background: var(--neon); border: none; border-radius: 15px; 
            color: #000; font-weight: 800; cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        .btn:active { transform: scale(0.95); }

        .menu-btn { position: fixed; top: 25px; left: 25px; z-index: 10001; font-size: 24px; cursor: pointer; background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 12px; }
    </style>
</head>
<body>

    <audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
    <audio id="menuSound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>
    <audio id="successSound" src="https://www.soundjay.com/communication/sounds/message-sent-1.mp3"></audio>

    <div class="menu-btn" onclick="playMenuSound(); toggleMenu()">☰</div>

    <div class="sidebar" id="sidebar">
        <button class="btn" onclick="playClick(); googleLogin()">Google bilan kirish</button>
        <h3 style="margin-top: 30px; color: var(--neon);">Creator</h3>
        <p>Karimov Asliddin</p>
    </div>

    <div class="glass-card">
        <h1 style="text-align: center; margin-bottom: 20px;">AI Search Pro</h1>
        <input type="text" id="query" style="width:100%; padding:15px; border-radius:12px; background:rgba(0,0,0,0.3); color:white; border:1px solid rgba(255,255,255,0.1); outline:none;" placeholder="Savol yozing...">
        <button class="btn" onclick="playClick(); askAI()">AI dan so'rash</button>
        <div id="answer" style="margin-top:20px; color:#cbd5e1; line-height:1.6;"></div>
    </div>

    <script>
        // Ovoz funksiyalari
        const clickSnd = document.getElementById('clickSound');
        const menuSnd = document.getElementById('menuSound');
        const successSnd = document.getElementById('successSound');

        function playClick() { clickSnd.currentTime = 0; clickSnd.play(); }
        function playMenuSound() { menuSnd.currentTime = 0; menuSnd.play(); }

        // Firebase sozlamalarini o'zingizniki bilan almashtiring!
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "ID",
            appId: "APP_ID"
        };
        firebase.initializeApp(firebaseConfig);

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

        async function askAI() {
            const input = document.getElementById('query');
            const answerDiv = document.getElementById('answer');
            if(!input.value.trim()) return;

            answerDiv.innerHTML = "O'ylanmoqdaman...";
            
            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: `query=${encodeURIComponent(input.value)}`
                });
                const data = await response.json();
                successSnd.play(); // Javob kelganda ovoz chiqadi
                answerDiv.innerText = data.result;
            } catch (e) {
                answerDiv.innerText = "Xatolik!";
            }
        }
    </script>
</body>
</html>
