<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Qidiruv Tizimi</title>
    <style>
        /* Asosiy stil va fon */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background: radial-gradient(circle at top right, #2e1065, #0f172a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Shaffof oyna (Glassmorphism) dizayni */
        .container {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px); /* Xiralashtirish effekti */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 35px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s ease-out; /* Animatsiya */
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { font-size: 1.2rem; opacity: 0.8; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        h1 { font-size: 2.2rem; margin-bottom: 25px; font-weight: 700; letter-spacing: -1px; }

        /* Input va Tugma */
        input {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            color: white;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
            margin-bottom: 15px;
        }

        input:focus { border-color: #38bdf8; background: rgba(255, 255, 255, 0.15); box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }

        button {
            width: 100%;
            padding: 14px;
            background: #38bdf8;
            border: none;
            border-radius: 12px;
            color: #0f172a;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.4s;
            margin-bottom: 25px;
        }

        button:hover { background: #0ea5e9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(14, 165, 233, 0.4); }

        /* Javob oynasi */
        #res {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 18px;
            padding: 20px;
            min-height: 120px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .loading { font-style: italic; opacity: 0.6; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Qidiruv Tizimi</h2>
    <h1>AI Search</h1>
    
    <input type="text" id="query" placeholder="Savolingizni yozing..." autocomplete="off">
    <button onclick="askAI()">Izlash</button>

    <div id="res">
        <strong>Javob:</strong>
        <p id="answer" class="loading">Salom! Sizga qanday yordam bera olaman?</p>
    </div>
</div>

<script>
    async function askAI() {
        const queryInput = document.getElementById('query');
        const answerElement = document.getElementById('answer');
        
        if(!queryInput.value.trim()) return;

        answerElement.innerHTML = "O'ylanmoqdaman...";
        answerElement.className = "loading";

        try {
            // Ma'lumotni Python serveringizdan (/search) xavfsiz oladi
            const response = await fetch('/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `query=${encodeURIComponent(queryInput.value)}`
            });
            
            const data = await response.json();
            answerElement.innerText = data.result || "Xatolik yuz berdi.";
            answerElement.className = ""; // Loading klassini olib tashlash
        } catch (error) {
            answerElement.innerText = "Server bilan bog'lanishda xato yuz berdi!";
        }
    }
</script>

</body>
</html>
