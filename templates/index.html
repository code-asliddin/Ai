<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Search - Asliddin</title>
    <style>
        /* Asosiy fon va dizayn */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: radial-gradient(circle at top right, #2e1065, #0f172a); height: 100vh; color: white; overflow: hidden; }

        /* Hamburger Menyu Tugmasi */
        .menu-btn { position: absolute; top: 20px; left: 20px; font-size: 24px; cursor: pointer; z-index: 1000; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; backdrop-filter: blur(5px); }

        /* Yon Menyu (Sidebar) */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); transition: 0.4s; z-index: 999; padding: 80px 20px 20px; border-right: 1px solid rgba(255,255,255,0.1); }
        .sidebar.active { left: 0; }
        .sidebar h3 { margin-bottom: 20px; font-size: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; color: #38bdf8; }
        .sidebar p { font-size: 0.9rem; margin-bottom: 15px; opacity: 0.8; }
        .history-list { list-style: none; max-height: 300px; overflow-y: auto; }
        .history-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 0.85rem; cursor: pointer; }

        /* Asosiy Konteyner */
        .container { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 35px; width: 100%; max-width: 450px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        h1 { font-size: 2rem; margin-bottom: 20px; text-align: center; }
        input { width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; color: white; margin-bottom: 15px; outline: none; }
        button { width: 100%; padding: 14px; background: #38bdf8; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0ea5e9; transform: translateY(-2px); }
        #res { margin-top: 20px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; min-height: 100px; font-size: 0.95rem; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <div class="sidebar" id="sidebar">
        <h3>Creator</h3>
        <p><strong>Ism:</strong> Karimov Asliddin</p>
        <p><strong>Loyaha:</strong> AI Search Engine</p>
        
        <h3 style="margin-top: 30px;">Tarix</h3>
        <ul class="history-list" id="historyList">
            <li class="history-item">Hozircha tarix bo'sh...</li>
        </ul>
    </div>

    <div class="container">
        <div class="glass-card">
            <h1>AI Search</h1>
            <input type="text" id="query" placeholder="Savolingizni yozing...">
            <button onclick="askAI()">Izlash</button>
            <div id="res">
                <strong>Javob:</strong>
                <p id="answer">Savol bering...</p>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        async function askAI() {
            const queryInput = document.getElementById('query');
            const answerElement = document.getElementById('answer');
            const historyList = document.getElementById('historyList');
            
            if(!queryInput.value.trim()) return;

            const userQuery = queryInput.value;
            answerElement.innerText = "O'ylanmoqdaman...";

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `query=${encodeURIComponent(userQuery)}`
                });
                
                const data = await response.json();
                answerElement.innerText = data.result || "Xatolik!";

                // Tarixga qo'shish
                if(historyList.innerHTML.includes("bo'sh")) historyList.innerHTML = "";
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerText = userQuery.substring(0, 30) + "...";
                historyList.prepend(li);

            } catch (error) {
                answerElement.innerText = "Serverda xato!";
            }
        }
    </script>
</body>
</html>
