<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Search - Karimov Asliddin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at top right, #1e1b4b, #020617); min-height: 100vh; color: white; display: flex; flex-direction: column; align-items: center; padding: 100px 20px 50px; }

        .menu-btn { position: fixed; top: 20px; left: 20px; font-size: 24px; cursor: pointer; z-index: 10001; background: rgba(255, 255, 255, 0.1); padding: 12px 16px; border-radius: 14px; backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }

        .sidebar { position: fixed; left: -300px; top: 0; width: 280px; height: 100%; background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(25px); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10000; padding: 90px 20px 20px; border-right: 1px solid rgba(56, 189, 248, 0.3); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.5); }

        .new-chat-btn { background: #0ea5e9; color: white; padding: 12px; border-radius: 10px; text-align: center; font-weight: bold; cursor: pointer; margin-bottom: 25px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        h3 { font-size: 0.9rem; color: #38bdf8; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; letter-spacing: 1.5px; text-transform: uppercase; }
        
        .creator-info { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .creator-info p { font-size: 0.85rem; margin-bottom: 5px; }

        .history-list { flex-grow: 1; overflow-y: auto; list-style: none; }
        .history-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 0.85rem; cursor: pointer; border: 1px solid transparent; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item:hover { border-color: #38bdf8; }

        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; padding: 30px; width: 100%; max-width: 550px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        h1 { font-size: 2rem; margin-bottom: 20px; text-align: center; }
        input { width: 100%; padding: 16px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; color: white; margin-bottom: 15px; outline: none; font-size: 1rem; }
        .send-btn { width: 100%; padding: 16px; background: #0ea5e9; border: none; border-radius: 16px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }

        #res { margin-top: 25px; background: rgba(0, 0, 0, 0.3); padding: 20px; border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.05); line-height: 1.6; font-size: 0.95rem; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <div class="sidebar" id="sidebar">
        <div class="new-chat-btn" onclick="newChat()"><span>+</span> Yangi Chat</div>
        <h3>Creator</h3>
        <div class="creator-info">
            <p><strong>Ism:</strong> Karimov Asliddin</p>
            <p><strong>Roli:</strong> AI Developer</p>
        </div>
        <h3>Tarix</h3>
        <div class="history-list" id="historyList"></div>
    </div>

    <div class="glass-card">
        <h1>AI Search</h1>
        <input type="text" id="query" placeholder="Savol bering..." autocomplete="off">
        <button class="send-btn" onclick="askAI()">Izlash</button>
        <div id="res">
            <strong style="color: #38bdf8;">Javob:</strong>
            <p id="answer" style="margin-top: 10px;">Salom! Qanday yordam bera olaman?</p>
        </div>
    </div>

    <script>
        // Sahifa yuklanganda tarixni tiklash
        window.onload = loadHistory;

        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('active');
            document.body.style.overflow = sidebar.classList.contains('active') ? "hidden" : "auto";
        }

        function newChat() {
            document.getElementById('query').value = "";
            document.getElementById('answer').innerText = "Yangi chat boshlandi.";
            toggleMenu();
        }

        function saveToHistory(query) {
            let history = JSON.parse(localStorage.getItem('ai_history')) || [];
            history.unshift(query);
            if (history.length > 20) history.pop(); // Oxirgi 20 ta savolni saqlash
            localStorage.setItem('ai_history', JSON.stringify(history));
            loadHistory();
        }

        function loadHistory() {
            const historyList = document.getElementById('historyList');
            const history = JSON.parse(localStorage.getItem('ai_history')) || [];
            historyList.innerHTML = history.length ? "" : '<div class="history-item" style="opacity: 0.5;">Hozircha bo\'sh...</div>';
            
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerText = item;
                div.onclick = () => { document.getElementById('query').value = item; askAI(); toggleMenu(); };
                historyList.appendChild(div);
            });
        }

        async function askAI() {
            const input = document.getElementById('query');
            const answer = document.getElementById('answer');
            const queryText = input.value.trim();

            if (!queryText) return;
            answer.innerText = "Qidirilmoqda...";
            
            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `query=${encodeURIComponent(queryText)}`
                });
                const data = await response.json();
                answer.innerText = data.result || "Xatolik!";
                saveToHistory(queryText);
                input.value = "";
            } catch (e) {
                answer.innerText = "Server xatosi!";
            }
        }

        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const btn = document.querySelector('.menu-btn');
            if (!sidebar.contains(e.target) && !btn.contains(e.target) && sidebar.classList.contains('active')) toggleMenu();
        });
    </script>
</body>
</html>
