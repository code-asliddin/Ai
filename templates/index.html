<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Search Pro - Karimov Asliddin</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        :root { --neon-blue: #0ea5e9; --deep-dark: #020617; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%); 
            min-height: 100vh; color: white; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center; padding: 80px 20px;
        }

        /* Neon Chiroqlar */
        body::before {
            content: ""; position: fixed; top: -10%; left: -10%; width: 40%; height: 40%;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }

        /* Super Sidebar */
        .sidebar { 
            position: fixed; left: -320px; top: 0; width: 300px; height: 100%; 
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(30px); 
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10000; 
            padding: 100px 25px 30px; border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sidebar.active { left: 0; box-shadow: 20px 0 80px rgba(0,0,0,0.8); }

        /* Profil Qismi */
        .profile-section {
            text-align: center; margin-bottom: 40px; padding: 20px;
            background: rgba(255, 255, 255, 0.05); border-radius: 20px;
        }
        .profile-img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--neon-blue); margin-bottom: 10px; object-fit: cover; }

        /* Glass Card */
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; 
            padding: 50px 30px; width: 100%; max-width: 600px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6); transform: perspective(1000px);
        }

        h1 { font-size: 3rem; font-weight: 900; background: linear-gradient(to right, #fff, var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; text-align: center; }

        /* Input & Button */
        .search-box { position: relative; width: 100%; }
        input { 
            width: 100%; padding: 20px 25px; background: rgba(255, 255, 255, 0.05); 
            border: 2px solid rgba(255, 255, 255, 0.05); border-radius: 20px; 
            color: white; font-size: 1.1rem; outline: none; transition: 0.4s;
        }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(14, 165, 233, 0.2); }

        button.main-btn { 
            width: 100%; padding: 18px; margin-top: 15px; background: var(--neon-blue); 
            border: none; border-radius: 20px; color: white; font-weight: 800; 
            cursor: pointer; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(14, 165, 233, 0.4);
            transition: 0.3s;
        }
        button.main-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(14, 165, 233, 0.6); }

        /* Menu Toggle */
        .menu-toggle { position: fixed; top: 25px; left: 25px; z-index: 10001; cursor: pointer; color: white; font-size: 28px; background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 15px; }

        .history-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 10px; cursor: pointer; border: 1px solid transparent; transition: 0.3s; }
        .history-item:hover { border-color: var(--neon-blue); background: rgba(14, 165, 233, 0.05); }

        #res { margin-top: 30px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <div class="sidebar" id="sidebar">
        <div class="profile-section" id="profileSection">
            <button class="main-btn" onclick="googleLogin()">Google bilan kirish</button>
        </div>
        
        <h3>Creator</h3>
        <p style="font-size: 0.9rem; opacity: 0.7; margin: 10px 0 30px;">Karimov Asliddin</p>

        <h3>Oxirgi savollar</h3>
        <div id="historyList"></div>
    </div>

    <div class="glass-card">
        <h1>AI Search Pro</h1>
        <div class="search-box">
            <input type="text" id="query" placeholder="Sizni nima qiziqtiradi?" autocomplete="off">
            <button class="main-btn" onclick="askAI()">AI dan so'rash</button>
        </div>

        <div id="res">
            <p id="answer" style="opacity: 0.8; font-size: 1.05rem;"></p>
        </div>
    </div>

    <script>
        // Firebase Config (O'z kodingizni bu yerga qo'ying)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(res => {
                updateUI(res.user);
            }).catch(err => console.log(err));
        }

        function updateUI(user) {
            const profile = document.getElementById('profileSection');
            profile.innerHTML = `
                <img src="${user.photoURL}" class="profile-img">
                <h4>${user.displayName}</h4>
                <p style="font-size: 0.8rem; opacity: 0.6;">${user.email}</p>
            `;
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // Qidiruv va Tarix funksiyalari (avvalgi muloqotdagidek)
        async function askAI() {
            const input = document.getElementById('query');
            const answer = document.getElementById('answer');
            if(!input.value.trim()) return;

            answer.innerHTML = "O'ylanmoqdaman...";
            // Fetch logic...
        }
    </script>
</body>
</html>
